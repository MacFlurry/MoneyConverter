<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convertisseur Devises Live</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');

        :root {
            --bg-top: #0f172a;
            --bg-bottom: #1d4ed8;
            --panel: #f8fafc;
            --panel-soft: #e2e8f0;
            --text: #0b1324;
            --muted: #475569;
            --primary: #0ea5e9;
            --primary-dark: #0369a1;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --warning-bg: #fef3c7;
            --warning-text: #92400e;
            --danger-bg: #fee2e2;
            --danger-text: #991b1b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.25), transparent 45%),
                radial-gradient(circle at 85% 20%, rgba(125, 211, 252, 0.25), transparent 40%),
                linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(820px, 100%);
            background: rgba(248, 250, 252, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 22px;
            backdrop-filter: blur(6px);
            box-shadow: 0 22px 55px rgba(2, 6, 23, 0.35);
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.3rem, 2.4vw, 1.8rem);
            letter-spacing: -0.01em;
        }

        .subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 0.93rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 0.84rem;
            font-weight: 700;
        }

        .status.ok {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .status.loading {
            background: var(--warning-bg);
            color: var(--warning-text);
        }

        .status.error {
            background: var(--danger-bg);
            color: var(--danger-text);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .updated-at {
            font-size: 0.84rem;
            color: var(--muted);
        }

        button {
            appearance: none;
            border: 0;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-weight: 700;
            padding: 10px 14px;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .field {
            background: var(--panel);
            border: 1px solid var(--panel-soft);
            border-radius: 14px;
            padding: 12px;
        }

        .field label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #0f172a;
            font-weight: 700;
        }

        .code {
            font-size: 0.78rem;
            font-weight: 800;
            color: #0f172a;
            background: #e2e8f0;
            border-radius: 999px;
            padding: 4px 8px;
        }

        .field input {
            width: 100%;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 1rem;
            font-weight: 600;
            color: #0b1324;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .field input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.18);
        }

        .hint {
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.82rem;
            line-height: 1.45;
        }

        @media (max-width: 700px) {
            .card {
                padding: 18px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .toolbar {
                align-items: stretch;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <header class="header">
            <div>
                <h1>Convertisseur Devises</h1>
                <p class="subtitle">CDF, XAF, EUR et USD avec taux dynamiques</p>
            </div>
            <div id="status" class="status loading">Chargement des taux...</div>
        </header>

        <div class="toolbar">
            <div class="updated-at" id="updatedAt">Dernière mise à jour: --</div>
            <button id="refreshBtn" type="button">Rafraîchir les taux</button>
        </div>

        <section class="grid" aria-label="Montants par devise">
            <div class="field">
                <label for="cdf">Franc Congolais <span class="code">CDF</span></label>
                <input type="text" id="cdf" inputmode="decimal" autocomplete="off" placeholder="0" />
            </div>

            <div class="field">
                <label for="xaf">Franc CFA <span class="code">XAF</span></label>
                <input type="text" id="xaf" inputmode="decimal" autocomplete="off" placeholder="0" />
            </div>

            <div class="field">
                <label for="eur">Euro <span class="code">EUR</span></label>
                <input type="text" id="eur" inputmode="decimal" autocomplete="off" placeholder="0" />
            </div>

            <div class="field">
                <label for="usd">Dollar US <span class="code">USD</span></label>
                <input type="text" id="usd" inputmode="decimal" autocomplete="off" placeholder="0" />
            </div>
        </section>

    </main>

    <script>
        const FALLBACK_RATES_PER_USD = {
            USD: 1,
            EUR: 0.92,
            XAF: 600,
            CDF: 2270
        };

        const fields = {
            CDF: document.getElementById('cdf'),
            XAF: document.getElementById('xaf'),
            EUR: document.getElementById('eur'),
            USD: document.getElementById('usd')
        };

        const statusEl = document.getElementById('status');
        const updatedAtEl = document.getElementById('updatedAt');
        const refreshBtn = document.getElementById('refreshBtn');

        let ratesPerUSD = { ...FALLBACK_RATES_PER_USD };
        let isUpdating = false;
        const numberFormatter = new Intl.NumberFormat('fr-FR', {
            useGrouping: true,
            maximumFractionDigits: 4
        });

        function parseLocaleNumber(text) {
            const normalized = text.replace(/\s/g, '').replace(',', '.');
            const value = Number.parseFloat(normalized);
            return Number.isFinite(value) ? value : NaN;
        }

        function formatNumber(value) {
            if (!Number.isFinite(value)) return '';
            const rounded = Math.round((value + Number.EPSILON) * 10000) / 10000;
            return numberFormatter.format(rounded);
        }

        function toUSD(amount, sourceCurrency) {
            if (sourceCurrency === 'USD') return amount;
            return amount / ratesPerUSD[sourceCurrency];
        }

        function fromUSD(usd) {
            return {
                USD: usd,
                EUR: usd * ratesPerUSD.EUR,
                XAF: usd * ratesPerUSD.XAF,
                CDF: usd * ratesPerUSD.CDF
            };
        }

        function setStatus(type, text) {
            statusEl.className = `status ${type}`;
            statusEl.textContent = text;
        }

        function setUpdatedAtLabel(date, fallbackUsed = false) {
            const when = new Intl.DateTimeFormat('fr-FR', {
                dateStyle: 'short',
                timeStyle: 'medium'
            }).format(date);

            updatedAtEl.textContent = fallbackUsed
                ? `Dernière mise à jour locale: ${when}`
                : `Dernière mise à jour live: ${when}`;
        }

        function clearOtherFields(sourceCurrency) {
            isUpdating = true;
            Object.keys(fields).forEach((currency) => {
                if (currency !== sourceCurrency) fields[currency].value = '';
            });
            isUpdating = false;
        }

        function handleInput(sourceCurrency) {
            if (isUpdating) return;

            const raw = fields[sourceCurrency].value.trim();
            if (raw === '') {
                clearOtherFields(sourceCurrency);
                return;
            }

            const amount = parseLocaleNumber(raw);
            if (Number.isNaN(amount)) return;

            const usd = toUSD(amount, sourceCurrency);
            const converted = fromUSD(usd);

            isUpdating = true;
            Object.keys(fields).forEach((currency) => {
                if (currency === sourceCurrency) return;
                fields[currency].value = formatNumber(converted[currency]);
            });
            isUpdating = false;
        }

        async function fetchRates() {
            setStatus('loading', 'Mise à jour des taux...');
            refreshBtn.disabled = true;

            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 7000);

            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD', {
                    signal: controller.signal
                });

                if (!response.ok) {
                    throw new Error(`Erreur HTTP ${response.status}`);
                }

                const data = await response.json();
                const apiRates = data && data.rates ? data.rates : {};

                const required = ['EUR', 'XAF', 'CDF'];
                const hasAllRates = required.every((code) => Number.isFinite(apiRates[code]) && apiRates[code] > 0);

                if (!hasAllRates) {
                    throw new Error('Taux incomplets reçus depuis l\'API');
                }

                ratesPerUSD = {
                    USD: 1,
                    EUR: apiRates.EUR,
                    XAF: apiRates.XAF,
                    CDF: apiRates.CDF
                };

                setStatus('ok', 'Taux live actifs');
                setUpdatedAtLabel(new Date(), false);
            } catch (error) {
                ratesPerUSD = { ...FALLBACK_RATES_PER_USD };
                setStatus('error', 'API indisponible: taux de secours actifs');
                setUpdatedAtLabel(new Date(), true);
                console.error('Impossible de récupérer les taux live:', error);
            } finally {
                clearTimeout(timeout);
                refreshBtn.disabled = false;
            }
        }

        Object.keys(fields).forEach((currency) => {
            fields[currency].addEventListener('input', () => handleInput(currency));
            fields[currency].addEventListener('focus', () => fields[currency].select());
        });

        refreshBtn.addEventListener('click', fetchRates);

        fetchRates();
        setInterval(fetchRates, 15 * 60 * 1000);
    </script>
</body>
</html>
